  <footer>
        <div class="container">
            <div class="row">
                <div class="col-md-4">
                    <span class="copyright">Derechos de autor &copy; {{ site.title }} {{ 'now' | date: "%Y" }}</span>
                </div>
                <div class="col-md-4">
                    <ul class="list-inline social-buttons">
                        {% for network in site.social %}
                        <li>
                            <a href="{{ network.url }}" target="_blank" rel="noopener noreferrer" >
                                <i class="fa fa-{{ network.title }}"></i>
                            </a>
                        </li>
                        {% endfor %}
                    </ul>
                </div>
                <div class="col-md-4">
                    <ul class="list-inline quicklinks">
                        <li><a href="#">Política de privacidad</a>
                        </li>
                        <!--<li><a href="#">Términos de uso</a>
                        </li>-->
                        <!--<li><a href="{{ "/feed.xml" | prepend: site.baseurl }}">Suscribirse via RSS</a>
                        </li>-->
                    </ul>
                </div>
            </div>
        </div>
    </footer>
