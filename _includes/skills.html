<!-- Skills Section -->
    <section id="skills" class="bg-light-gray">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 text-center">
                    <h2 class="section-heading">Habilidades</h2>
                    <h3 class="section-subheading text-muted">Capacidades técnicas para grandes desafíos</h3>
                </div>
            </div>
            <div class="row skills-grid">
                {% for skill in site.skills %}
                <div class="col-md-4 col-sm-6 skills-col">
                    <div class="skill-card">
                        <div class="skill-card-header">
                            <span class="skill-icon"><i class="fa {{ skill.icon }}"></i></span>
                            <h4 class="skill-group-title">{{ skill.group }}</h4>
                        </div>
                        <div class="skill-badges">
                            {% for item in skill.list %}
                            <span class="skill-badge{% if forloop.index > 3 %} skill-badge-extra{% endif %}">{{ item }}</span>
                            {% endfor %}
                            {% if skill.list.size > 3 %}
                            <button class="skill-expand-btn" onclick="toggleSkillCard(this)">
                                +{{ skill.list.size | minus: 3 }} más
                            </button>
                            {% endif %}
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </section>
    <script>
        function toggleSkillCard(btn) {
            var badges = btn.parentElement.querySelectorAll('.skill-badge-extra');
            var expanded = btn.getAttribute('data-expanded') === 'true';
            badges.forEach(function (b) { b.style.display = expanded ? 'none' : 'inline-block'; });
            btn.setAttribute('data-expanded', expanded ? 'false' : 'true');
            btn.textContent = expanded ? btn.getAttribute('data-label') : 'Ver menos';
            if (!btn.getAttribute('data-label')) {
                btn.setAttribute('data-label', btn.textContent);
            }
        }
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.skill-badge-extra').forEach(function (b) { b.style.display = 'none'; });
            document.querySelectorAll('.skill-expand-btn').forEach(function (btn) {
                btn.setAttribute('data-expanded', 'false');
                btn.setAttribute('data-label', btn.textContent);
            });
        });
    </script>
